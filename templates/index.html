<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barca vs Real Madrid Player Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #004D98 0%, #A50044 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #004D98;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .upload-area {
            border: 3px dashed #004D98;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            background: #f0f8ff;
            border-color: #A50044;
        }
        
        .upload-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .file-label {
            display: inline-block;
            padding: 12px 30px;
            background: #004D98;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .file-label:hover {
            background: #003d7a;
            transform: translateY(-2px);
        }
        
        .file-name {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #A50044;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .submit-btn:hover {
            background: #8a0038;
            transform: translateY(-2px);
        }
        
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 14px;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Player Detection</h1>
        <p class="subtitle">Barcelona vs Real Madrid</p>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/predict" enctype="multipart/form-data" id="uploadForm">
            <div class="upload-area">
                <div class="upload-icon">📸</div>
                <label for="file-input" class="file-label">Choose Image</label>
                <input type="file" id="file-input" name="file" accept="image/*" required>
                <div class="file-name" id="file-name">No file chosen</div>
            </div>
            
            <button type="submit" class="submit-btn" id="submit-btn" disabled>Detect Players</button>
        </form>
        
        <div class="info">
            <strong>How to use:</strong><br>
            1. Upload an image from a Barcelona vs Real Madrid match<br>
            2. Click "Detect Players"<br>
            3. See the detected players with bounding boxes!
        </div>
    </div>
    
    <script>
        const fileInput = document.getElementById('file-input');
        const fileName = document.getElementById('file-name');
        const submitBtn = document.getElementById('submit-btn');
        
        fileInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                fileName.textContent = e.target.files[0].name;
                submitBtn.disabled = false;
            } else {
                fileName.textContent = 'No file chosen';
                submitBtn.disabled = true;
            }
        });
        
        document.getElementById('uploadForm').addEventListener('submit', function() {
            submitBtn.textContent = 'Detecting...';
            submitBtn.disabled = true;
        });
    </script>
</body>
</html>
